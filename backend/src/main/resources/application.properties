# 应用基础信息与后端端口
spring.application.name=Lab Equipment Repair
server.port=18080

# MySQL 数据源配置：数据库名包含短横线，JDBC URL 中不需要反引号
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/lab-equipment-repair?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置：开启下划线到驼峰映射，例如 user.avatar_path -> avatarPath
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=org.example.lab_equipment_repair.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# JWT 配置：过期时间单位为秒
app.security.jwt-secret=LabEquipmentRepairJwtSecretKeyForTrainingProject2026
app.security.jwt-expire-seconds=86400

# 头像上传目录：相对 backend 工作目录保存
app.upload.avatar-dir=uploads/avatars

# 日志配置：日志会写入当前运行目录的 logs/lab-equipment-repair.log
# 如果 IDEA 的工作目录是 backend，则路径为 backend/logs/lab-equipment-repair.log
# 如果工作目录是项目根目录，则路径为 logs/lab-equipment-repair.log
logging.file.path=logs
logging.file.name=logs/lab-equipment-repair.log
logging.level.org.example.lab_equipment_repair=debug
logging.level.org.springframework.security=info
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{60} - %msg%n
